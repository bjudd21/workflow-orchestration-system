<!DOCTYPE html>
<html>
<head>
  <title>PRD Workflow Dashboard</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://unpkg.com/alpinejs@3.13.5/dist/cdn.min.js" defer></script>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
      background: #f5f5f5;
    }
    h1 { color: #333; margin-bottom: 8px; }
    .subtitle { color: #666; font-size: 14px; margin-bottom: 24px; }

    .header-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }

    .btn {
      background: #0071e3;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 10px 20px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
    }
    .btn:hover { background: #005bbf; }
    .btn-success { background: #34c759; }
    .btn-success:hover { background: #30b350; }

    .projects-table {
      background: white;
      border-radius: 8px;
      border: 1px solid #ddd;
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead {
      background: #f9f9f9;
      border-bottom: 2px solid #ddd;
    }

    th {
      padding: 12px 16px;
      text-align: left;
      font-size: 13px;
      font-weight: 600;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    td {
      padding: 14px 16px;
      border-bottom: 1px solid #f0f0f0;
      font-size: 14px;
    }

    tr:last-child td {
      border-bottom: none;
    }

    tbody tr:hover {
      background: #fafafa;
    }

    .project-name {
      font-weight: 600;
      color: #0071e3;
      cursor: pointer;
    }
    .project-name:hover {
      text-decoration: underline;
    }

    .status-badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 600;
    }

    .status-pending { background: #e0e0e0; color: #666; }
    .status-in_progress { background: #fff3cd; color: #856404; }
    .status-completed { background: #d4edda; color: #155724; }
    .status-failed { background: #f8d7da; color: #721c24; }

    .phase-indicator {
      display: flex;
      gap: 4px;
      align-items: center;
    }

    .phase-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #e0e0e0;
    }
    .phase-dot.active { background: #0071e3; }
    .phase-dot.complete { background: #34c759; }

    .timestamp {
      color: #888;
      font-size: 13px;
    }

    .actions {
      display: flex;
      gap: 8px;
    }

    .action-btn {
      padding: 6px 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      background: white;
      font-size: 12px;
      cursor: pointer;
      color: #666;
    }
    .action-btn:hover {
      background: #f5f5f5;
      color: #333;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #888;
    }
    .empty-state h2 {
      margin-bottom: 12px;
      color: #666;
    }

    @media (max-width: 768px) {
      table { font-size: 12px; }
      th, td { padding: 10px 12px; }
      .actions { flex-direction: column; }
    }
  </style>
</head>
<body x-data="dashboardState()" x-cloak>

  <div class="header-actions">
    <div>
      <h1>PRD Workflow Dashboard</h1>
      <div class="subtitle">
        <span x-text="projects.length"></span> project(s) •
        Last updated: <span x-text="formatTime(lastUpdate)"></span>
      </div>
    </div>
    <a href="/webhook/prd-interview" class="btn btn-success">
      + New Project
    </a>
  </div>

  <div x-show="loading" class="projects-table" style="padding: 40px; text-align: center;">
    <p>Loading projects...</p>
  </div>

  <div x-show="!loading && projects.length === 0" class="empty-state">
    <h2>No projects yet</h2>
    <p>Start your first PRD workflow interview</p>
    <a href="/webhook/prd-interview" class="btn btn-success" style="margin-top: 16px;">
      + New Project
    </a>
  </div>

  <div x-show="!loading && projects.length > 0" class="projects-table">
    <table>
      <thead>
        <tr>
          <th>Project</th>
          <th>Phases</th>
          <th>Current Phase</th>
          <th>Status</th>
          <th>Last Updated</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <template x-for="project in projects" :key="project.project">
          <tr>
            <td>
              <a :href="`/webhook/prd-interview?project=${project.project}`" class="project-name" x-text="project.project"></a>
            </td>
            <td>
              <div class="phase-indicator">
                <div class="phase-dot" :class="getPhaseClass(project, 'interview')" title="Interview"></div>
                <div class="phase-dot" :class="getPhaseClass(project, 'synthesis')" title="Synthesis"></div>
                <div class="phase-dot" :class="getPhaseClass(project, 'council')" title="Council"></div>
                <div class="phase-dot" :class="getPhaseClass(project, 'findings')" title="Findings"></div>
              </div>
            </td>
            <td x-text="formatPhase(project.currentPhase)"></td>
            <td>
              <span class="status-badge" :class="`status-${getCurrentStatus(project)}`" x-text="formatStatus(getCurrentStatus(project))"></span>
            </td>
            <td class="timestamp" x-text="formatTimestamp(project.lastUpdated)"></td>
            <td>
              <div class="actions">
                <button class="action-btn" @click="resumeProject(project.project)">
                  ↗️ Resume
                </button>
                <button class="action-btn" @click="viewPRD(project.project)" x-show="project.phases.synthesis?.status === 'completed'">
                  📄 View PRD
                </button>
              </div>
            </td>
          </tr>
        </template>
      </tbody>
    </table>
  </div>

  <script>
    function dashboardState() {
      return {
        projects: [],
        loading: true,
        lastUpdate: new Date(),

        async init() {
          await this.loadProjects();
          setInterval(() => this.loadProjects(), 10000); // Refresh every 10s
        },

        async loadProjects() {
          try {
            const response = await fetch('/webhook/api/dashboard/projects');
            const data = await response.json();
            this.projects = data.projects || [];
            this.lastUpdate = new Date();
          } catch (err) {
            console.error('Error loading projects:', err);
          } finally {
            this.loading = false;
          }
        },

        getPhaseClass(project, phaseName) {
          const phase = project.phases[phaseName];
          if (!phase) return '';
          if (phase.status === 'completed') return 'complete';
          if (phase.status === 'in_progress') return 'active';
          return '';
        },

        getCurrentStatus(project) {
          const currentPhase = project.phases[project.currentPhase];
          return currentPhase?.status || 'pending';
        },

        formatPhase(phase) {
          const names = {
            interview: 'Interview',
            synthesis: 'PRD Synthesis',
            council: 'Council Review',
            findings: 'Findings'
          };
          return names[phase] || phase;
        },

        formatStatus(status) {
          const names = {
            pending: 'Pending',
            in_progress: 'In Progress',
            completed: 'Completed',
            failed: 'Failed'
          };
          return names[status] || status;
        },

        formatTimestamp(timestamp) {
          const date = new Date(timestamp);
          const now = new Date();
          const diff = now - date;

          // Less than 1 minute
          if (diff < 60000) return 'Just now';

          // Less than 1 hour
          if (diff < 3600000) {
            const mins = Math.floor(diff / 60000);
            return `${mins} minute${mins > 1 ? 's' : ''} ago`;
          }

          // Less than 24 hours
          if (diff < 86400000) {
            const hours = Math.floor(diff / 3600000);
            return `${hours} hour${hours > 1 ? 's' : ''} ago`;
          }

          // Show date
          return date.toLocaleDateString();
        },

        formatTime(date) {
          return date.toLocaleTimeString();
        },

        resumeProject(projectName) {
          window.location.href = `/webhook/prd-interview?project=${projectName}`;
        },

        viewPRD(projectName) {
          window.location.href = `/webhook/prd-synthesis?project=${projectName}`;
        }
      };
    }
  </script>
</body>
</html>
